name: Build Certux ISO
on:
  workflow_run:
    workflows: ["build"] # This MUST match the exact 'name:' of your main OS build workflow
    types:
      - completed
  workflow_dispatch: # Keeps the manual button just in case you need it

jobs:
  build-iso:
    # Only run this if the main OS container built successfully
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build ISO using Universal Blue Installer
        uses: jasonn3/build-container-installer@v1.4.0
        with:
          arch: x86_64
          image_name: certux
          image_repo: ghcr.io/cable353
          image_tag: latest
          version: 42
          variant: Silverblue
          iso_name: Certux-OS-Installer.iso

      - name: Upload ISO as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Certux-OS-Installer
          path: ./*.iso
