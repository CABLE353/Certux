name: Build Certux ISO
on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build ISO using Universal Blue Installer
        uses: jasonn3/build-container-installer@v1.2.4
        with:
          arch: x86_64
          image_name: certux
          image_repo: ghcr.io/cable353
          image_tag: latest
          version: 42
          variant: Silverblue
          iso_name: Certux-OS-Installer.iso

      - name: Upload ISO as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Certux-OS-Installer
          path: ./*.iso
