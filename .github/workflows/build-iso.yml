name: Build Certux ISO
on:
  workflow_run:
    workflows: ["build"] # Ensure this matches the 'name:' in your build.yml
    types:
      - completed
  workflow_dispatch:

jobs:
  build-iso:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for creating the Release
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build ISO using Universal Blue Installer
        uses: jasonn3/build-container-installer@v1.2.4
        with:
          arch: x86_64
          image_name: certux
          image_repo: ghcr.io/cable353
          image_tag: latest
          version: 42
          variant: Silverblue
          iso_name: Certux-OS-Installer.iso

      - name: Upload ISO as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Certux-OS-Installer
          path: ./*.iso

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Certux OS Build ${{ github.run_number }}
          files: Certux-OS-Installer.iso
          draft: false
          prerelease: false
