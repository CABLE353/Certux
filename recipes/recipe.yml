name: certux
description: This is my personal OS image.

base-image: ghcr.io/ublue-os/silverblue-main
image-version: 42

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: systemd
    user:
      enabled:
        - certux-update-cache.service

  - type: script
    snippets:
      - "chmod +x /usr/bin/cert"
      - "chmod +x /usr/bin/certux-software"
      - "chmod +x /usr/bin/certux-law-setup"

  - type: dnf
    repos:
      copr:
        - atim/starship
    install:
      packages:
        - micro
        - starship
        - distrobox
        - python3-gobject
    remove:
      packages:
        - firefox
        - firefox-langpacks
        - gnome-software
        - gnome-software-plugin-flatpak

  # --- NEW: Windows UI Transformation ---
  - type: gnome-extensions
    install:
      - 1160 # Dash to Panel (Windows Taskbar)
      - 615  # AppIndicator Support (System Tray)

  - type: gschema-overrides
    include:
      - 99-certux-windows.gschema.override
  # --------------------------------------

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.mozilla.firefox
          - org.gnome.Loupe
      - scope: user
